# Cloudflare Worker: locahun3d (ビューアー本体)
#
# viewer.locahun3d.com で公開している3DGSオフラインビューアー。
# worker.js が POST /api/report を Resend でメール送信し、それ以外は静的アセットを配信。
# Custom Domain で DNS 自動設定。
#
# 初回のみ Resend キーをシークレット投入:
#   npx wrangler secret put RESEND_API_KEY
# デプロイ:
#   cd "F:\UNDEFINED Dropbox\UNDEFINED\Works\MFF\01_ProjectFile\3DGS"
#   npx wrangler deploy

name = "locahun3d"
main = "worker.js"
compatibility_date = "2026-06-22"

[assets]
directory = "./viewer-dist"
binding = "ASSETS"

# デモRAD(交差点)を配信するためのR2バインディング。
# worker.js の /api/demo-asset/ が ALLOWED_KEYS のオブジェクトだけを
# Range対応・CORS付きで再配信する（公開r2.dev URLはCORS無し&公開停止済のため）。
[[r2_buckets]]
binding = "R2_ASSETS"
bucket_name = "locahun3d-assets"
